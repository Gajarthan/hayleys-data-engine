name: Hayl Data Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

concurrency:
  group: hayl-data-pipeline
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pdfplumber
          npm install -g opencode-ai

      - name: Validate analyzer credentials
        run: |
          if [ -z "${OPENAI_API_KEY}" ] && [ -z "${ANTHROPIC_API_KEY}" ]; then
            echo "Missing credentials. Add OPENAI_API_KEY or ANTHROPIC_API_KEY secret."
            exit 1
          fi
          opencode --version

      - name: Fetch and store stock snapshots
        run: python hayl-status-checker/fetch_hayl_stock.py

      - name: Scrape and store report PDFs/metadata
        run: python hayl-status-checker/scrape_hayleys_reports.py

      - name: Extract report data with opencode
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: python hayl-status-checker/extract_reports_with_opencode.py

      - name: Upload daily data snapshot
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: hayl-data-snapshot-${{ github.run_number }}
          path: hayl-status-checker/data
          retention-days: 14

      - name: Commit data updates if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add hayl-status-checker/data
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "chore(data): refresh HAYL snapshots [skip ci]"
          git push

      - name: Slack alert on failure (optional)
        if: ${{ failure() && secrets.SLACK_WEBHOOK_URL != '' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          curl -X POST -H 'Content-type: application/json' --data "{\"text\":\"Hayl Data Pipeline failed for ${REPOSITORY}. Run: https://github.com/${REPOSITORY}/actions/runs/${RUN_ID}\"}" "$SLACK_WEBHOOK_URL"
