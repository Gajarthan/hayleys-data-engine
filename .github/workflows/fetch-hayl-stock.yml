name: Fetch HAYL Stock

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

concurrency:
  group: fetch-hayl-stock
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Fetch HAYL stock data
        run: python hayl-status-checker/fetch_hayl_stock.py

      - name: Upload snapshot artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: hayl-stock-snapshot-${{ github.run_number }}
          path: hayl-status-checker/data/raw/HAYL
          retention-days: 14

      - name: Commit data updates if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add hayl-status-checker/data/raw/HAYL
          if git diff --cached --quiet; then
            echo "No stock data changes to commit."
            exit 0
          fi
          git commit -m "chore(data): refresh HAYL stock snapshot [skip ci]"
          git push
